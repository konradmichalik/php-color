name: CI
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: pcov
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Run tests with 100% coverage gate
        run: composer check:coverage

  checks:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Run checks
        run: composer ci
